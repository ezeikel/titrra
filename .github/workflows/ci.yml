name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      # Unit tests are the deploy gate. They also run as a dependency of
      # `pnpm build` (turbo build → test), so a red test fails the Vercel
      # production build too — but we run them explicitly here for a fast,
      # clearly-named signal before the slower build.
      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # Gate e2e on the Playwright DB secret existing. Without it the job is
  # SKIPPED (the run stays green) rather than a confusing red — until
  # PLAYWRIGHT_DATABASE_URL exists, e2e simply doesn't run. (Pattern mirrors
  # chunky-crayon / cadem-sports.)
  #
  # PLAYWRIGHT_DATABASE_URL should point at a PERSISTENT, CI-owned Neon branch
  # (e.g. `ci-e2e`), NOT a throwaway. Fork it from `development` ONCE; the e2e
  # job runs `prisma migrate deploy` every run so its schema auto-tracks main's
  # committed migration history. Do NOT point it at the dev or production
  # branch. (The titrra specs seed via localStorage, so no DB seed step.)
  e2e-precheck:
    name: e2e precheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_db: ${{ steps.check.outputs.has_db }}
    steps:
      - id: check
        env:
          PLAYWRIGHT_DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
        run: |
          if [ -n "$PLAYWRIGHT_DATABASE_URL" ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAYWRIGHT_DATABASE_URL not set — e2e skipped. Add it (a persistent ci-e2e Neon branch) to enable Playwright in CI."
          fi

  e2e:
    name: Playwright e2e (non-blocking)
    runs-on: ubuntu-latest
    needs: e2e-precheck
    if: ${{ needs.e2e-precheck.outputs.has_db == 'true' }}
    timeout-minutes: 20
    # E2E is slower + browser-dependent, so it's visible but does NOT block the
    # deploy — the unit suite is the real gate.
    continue-on-error: true
    env:
      DATABASE_URL: ${{ secrets.PLAYWRIGHT_DATABASE_URL }}
      # NextAuth needs a secret to boot; the value is irrelevant to the specs
      # (they seed anonymous state via localStorage, no sessions).
      NEXT_AUTH_SECRET: 'ci_e2e_placeholder_secret'
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @titrra/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @titrra/web exec playwright install-deps chromium

      # Bring the ci-e2e Neon branch up to the committed schema (idempotent).
      # Retry migrate deploy: the ci-e2e compute auto-suspends when idle, so
      # the first connect of a run can race its cold-start wake (Prisma P1001,
      # which it doesn't retry itself).
      - name: Apply migrations to the Playwright DB
        working-directory: ./packages/db
        run: |
          for attempt in 1 2 3 4 5; do
            echo "migrate deploy attempt $attempt…"
            if pnpm exec prisma migrate deploy; then exit 0; fi
            echo "attempt $attempt failed (likely cold Neon compute); retrying…"
            sleep 10
          done
          echo "::error::prisma migrate deploy failed after 5 attempts"; exit 1

      # Runs against `next dev` (the playwright.config webServer): dev compiles
      # routes on demand and tolerates missing env (auth providers are
      # env-gated in auth.ts).
      - name: Run web Playwright e2e
        env:
          CI: 'true'
        run: pnpm --filter @titrra/web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
