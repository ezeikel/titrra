name: Deploy Titrra Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'
      # The worker imports the shared Prisma client + types + R2 storage.
      # Changes there must redeploy the worker or it runs against stale code.
      - 'packages/db/**'
      - 'packages/types/**'
      - 'packages/storage/**'
      - '.github/workflows/deploy-titrra-worker.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-and-restart'
        type: choice
        options:
          - deploy-and-restart
          - deploy-only
          - restart-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            ACTION="${{ inputs.action || 'deploy-and-restart' }}"
            cd /opt/titrra

            if [[ "$ACTION" == deploy* ]]; then
              echo "Pulling latest code..."
              git checkout -- . || true
              # Scope the clean to the worker dir only — never wipe the
              # gitignored .env or other local-only state elsewhere.
              git clean -fd apps/worker/ || true
              git pull origin main
              echo "Code pulled"

              echo "Installing titrra-worker dependencies..."
              # Monorepo uses pnpm workspace:* (@titrra/db, @titrra/types), so
              # install from the repo root and filter to the worker's dep graph.
              yes | /root/.local/share/pnpm/pnpm install \
                --filter "@titrra/worker..."
              echo "Worker deps installed"

              echo "Generating Prisma client..."
              /root/.local/share/pnpm/pnpm --filter @titrra/db db:generate
              echo "Prisma client generated"
            fi

            if [[ "$ACTION" != deploy-only ]]; then
              echo "Restarting titrra-worker service..."
              systemctl restart titrra-worker
              echo "Service restarted"
            fi

            sleep 3
            echo ""
            echo "=== Service Status ==="
            systemctl status titrra-worker --no-pager -l || true
            echo ""
            echo "=== Recent Logs ==="
            journalctl -u titrra-worker --no-pager -n 30 || true
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3070/health || echo "Health check failed"
