name: Renovate

on:
  schedule:
    - cron: "0 5 * * 1" # Monday 5am UTC
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.6
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
          env-regex: "^(?:RENOVATE_|FONTAWESOME_|LOG_LEVEL).*"
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_HOST_RULES: '[{"matchHost":"npm.fontawesome.com","hostType":"npm","token":"${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}"}]'
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          LOG_LEVEL: info
